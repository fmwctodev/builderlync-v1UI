<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo/icon.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Studio fonts: Inter (UI) + Geist Mono (numerics) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <!--
      Inter Variable: font-display: swap (UI legibility tolerates fallback briefly).
      Geist Mono Variable: font-display: optional (numerals tolerate fallback well; no FOUT swap).
      The &display= query controls the URL-served fallback strategy for Google Fonts.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource-variable/geist-mono@latest/index.min.css"
    />

    <title>BuilderLynk - Unified Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
